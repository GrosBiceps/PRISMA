# default_config.yaml — Configuration par défaut du pipeline FlowSOM Pro
# Toutes les valeurs peuvent être surchargées par un fichier YAML utilisateur.
# Voir config/constants.py pour les seuils cliniques ELN — NE PAS MODIFIER ICI.

paths:
  healthy_folder: "C:\\Users\\Florian Travail\\Documents\\FlowSom\\Data\\Moelle normale"
  patho_folder: "C:\\Users\\Florian Travail\\Documents\\FlowSom\\Data\\Patho"
  output_dir: "C:\\Users\\Florian Travail\\Documents\\FlowSom\\Perplexity\\Results"

analysis:
  compare_mode: true

pregate:
  apply: true
  mode: "auto"              # auto (GMM) | manual (percentiles)
  mode_blastes_vs_normal: true
  viable: true
  singlets: true
  cd45: true
  cd34: false

pregate_advanced:
  debris_min_percentile: 1.0
  debris_max_percentile: 99.0
  doublets_ratio_min: 0.6
  doublets_ratio_max: 1.4
  cd45_threshold_percentile: 5.0
  cd34_threshold_percentile: 85.0
  cd34_use_ssc_filter: true
  cd34_ssc_max_percentile: 60.0

flowsom:
  xdim: 25
  ydim: 25
  rlen: "auto"
  n_metaclusters: 8
  learning_rate: 0.05
  sigma: 1.5
  n_iterations: 10
  seed: 42

auto_clustering:
  enabled: false
  min_clusters: 5
  max_clusters: 35
  n_bootstrap: 10
  sample_size_bootstrap: 20000
  min_stability_threshold: 0.75
  weight_stability: 0.65
  weight_silhouette: 0.35

transform:
  method: "logicle"   # arcsinh | logicle | log10 | none
  cofactor: 5.0
  apply_to_scatter: false

normalize:
  method: "zscore"    # zscore | minmax | none

markers:
  exclude_scatter: true
  exclude_additional: []
  keep_area_only: true    # Supprime les doublons -H (Height) ; garde -A (Area) + FSC/SSC/Time

downsampling:
  enabled: false
  max_cells_per_file: 50000
  max_cells_total: 1000000

visualization:
  save_plots: true
  umap_enabled: true        # true = calculer UMAP après clustering
  plot_format: "png"        # png | pdf | svg
  dpi: 300

  # Paramètres par figure exportée
  figures:
    heatmap:
      figsize: [16, 8]
      cmap: "magma"
    metacluster_dist:
      figsize: [14, 6]
    umap:
      n_sample: 100000
      point_size: 3
      alpha: 0.5
    gating:
      n_sample: 60000
    sankey:
      height: 450
      paper_bgcolor: "#fafafa"
    html_report:
      self_contained: true

gpu:
  enabled: true

logging:
  level: "INFO"

population_mapping:
  enabled: true
  ref_mfi_dir: "C:\\Users\\Florian Travail\\Documents\\FlowSom\\Data\\Ref MFI"
  cache_dir: "output/ref_mfi_parquet_cache"
  distance_percentile: 60
  include_scatter: true
  normalization_method: "range"
  mapping_method: "cosine_prior"   # M12 recommandé ELN 2022
  unknown_threshold_mode: "auto_otsu"
  hard_limit_factor: 5.0
  prior_mode: "log10_cubed"
  transform_method: "arcsinh"
  arcsinh_cofactor: 5.0
  apply_to_scatter: false
  knn_sample_size: 2000
  knn_k: 15
  cov_reg_alpha: 0.0001
  total_knn_points: 15000
  blast_enabled: true
  blast_suspect_categories: ["BLAST_HIGH", "BLAST_MODERATE"]
  viz_interactive: true
  viz_max_points: 50000
